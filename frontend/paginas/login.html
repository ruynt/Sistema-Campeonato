<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login do Organizador</title>
  <link rel="stylesheet" href="../css/estilo.css" />
</head>
<body>
  <main class="container">
    <header class="cabecalho">
      <h1>Acesso do Organizador</h1>
      <p>Entre na sua conta ou crie um novo cadastro para gerenciar campeonatos.</p>
      <a href="./campeonatos-publicos.html" class="link-voltar">← Ir para campeonatos públicos</a>
    </header>

    <section class="card">
      <div class="abas-auth">
        <button id="aba-login" class="botao aba-ativa" type="button">Login</button>
        <button id="aba-cadastro" class="botao secundario" type="button">Cadastro</button>
      </div>

      <form id="form-login" class="formulario-auth">
        <h2>Entrar</h2>

        <div class="grupo-formulario">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" name="email" required />
        </div>

        <div class="grupo-formulario">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" name="senha" required />
        </div>

        <button type="submit" class="botao">Entrar</button>
      </form>

      <form id="form-cadastro" class="formulario-auth oculto">
        <h2>Criar conta</h2>

        <div class="grupo-formulario">
          <label for="cadastro-nome">Nome</label>
          <input type="text" id="cadastro-nome" name="nome" required />
        </div>

        <div class="grupo-formulario">
          <label for="cadastro-email">E-mail</label>
          <input type="email" id="cadastro-email" name="email" required />
        </div>

        <div class="grupo-formulario">
          <label for="cadastro-senha">Senha</label>
          <input type="password" id="cadastro-senha" name="senha" required />
        </div>

        <button type="submit" class="botao">Cadastrar</button>
      </form>

      <p id="mensagem-auth" class="mensagem"></p>
    </section>
  </main>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
