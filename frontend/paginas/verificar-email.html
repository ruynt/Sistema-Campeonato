<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação de E-mail</title>
  <link rel="stylesheet" href="../css/estilo.css" />
</head>
<body>
  <main class="container">
    <header class="cabecalho topo-inicio">
      <div>
        <h1>Verificação de e-mail</h1>
        <p>Confirme seu e-mail para ativar sua conta no sistema.</p>
      </div>
    </header>

    <section class="secao">
      <div class="bloco-informacoes">
        <p id="mensagem-verificacao">Verificando seu e-mail...</p>

        <div id="detalhes-verificacao" style="margin-top: 16px;"></div>

        <div id="acoes-verificacao" class="acoes-card" style="margin-top: 18px;">
          <a href="./participante.html" class="botao">
            Ir para login
          </a>

          <a href="./campeonatos-publicos.html" class="botao secundario">
            Ver campeonatos
          </a>
        </div>
      </div>
    </section>

    <section id="secao-reenvio" class="secao" style="display: none;">
      <h2>Reenviar e-mail de verificação</h2>

      <form id="form-reenviar-verificacao" class="formulario">
        <div class="grupo-formulario">
          <label for="email-reenvio">E-mail cadastrado</label>
          <input
            type="email"
            id="email-reenvio"
            name="email"
            placeholder="Digite seu e-mail"
            required
          />
        </div>

        <button type="submit" class="botao">
          Reenviar verificação
        </button>

        <p id="mensagem-reenvio" style="margin-top: 12px;"></p>
      </form>
    </section>
  </main>

  <script type="module" src="../js/verificar-email.js"></script>
</body>
</html>
